<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 红旗背景 -->
  <rect x="20" y="20" width="60" height="40" rx="3" ry="3" fill="#e60000" stroke="#cc0000" stroke-width="1"/>
  
  <!-- 五星图案 -->
  <polygon points="50,30 52,35 58,35 54,38 56,43 50,40 44,43 46,38 42,35 48,35" fill="#ffd700"/>
  
  <!-- 针线元素 -->
  <path d="M30,70 L70,70" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M30,70 Q40,65 50,70 Q60,75 70,70" stroke="#e60000" stroke-width="3" fill="none"/>
  <circle cx="30" cy="70" r="3" fill="#ffd700"/>
  <circle cx="70" cy="70" r="3" fill="#ffd700"/>
  
  <!-- 数字元素（代表数字平台） -->
  <path d="M50,85 C55,82 60,85 60,90 C60,95 55,98 50,95 C45,98 40,95 40,90 C40,85 45,82 50,85 Z" fill="#e60000" stroke="#cc0000" stroke-width="1"/>
